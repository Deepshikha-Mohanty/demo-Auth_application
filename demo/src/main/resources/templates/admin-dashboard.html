<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        body { background:#CEAFDE; }

        .navbar {
            background:#2F0E40;
            color:white;
            padding:15px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .user-dropdown { position:relative; cursor:pointer; }

        .dropdown-menu {
            display:none;
            position:absolute;
            right:0;
            top:35px;
            background:white;
            min-width:150px;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
            border-radius:4px;
            overflow:hidden;
        }

        .dropdown-menu a {
            display:block;
            padding:10px;
            text-decoration:none;
            color:black;
        }

        .dropdown-menu a:hover { background:#f2f2f2; }

        .container { padding:30px; }

        .card {
            background:#AD73C9;
            border-radius:6px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            margin-bottom:20px;
        }

        .card-header {
            background:#3F3742;
            color:white;
            padding:12px 20px;
        }

        .card-body { padding:25px; overflow-x:auto; }

        table {
            width:100%;
            border-collapse:collapse;
            min-width:1000px;
        }

        table th, table td {
            padding:10px;
            border-bottom:1px solid #ddd;
        }

        table th { background:#f2f2f2; }
    </style>
</head>
<body>

<div class="navbar">
    <h2>Admin Dashboard</h2>

    <div class="user-dropdown" onclick="toggleDropdown()">
        <span th:text="${#authentication.name}"></span> ▾
        <div class="dropdown-menu" id="dropdownMenu">

            <form th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />
                <button type="submit"
                        style="background:none;border:none;color:black;cursor:pointer;">
                    Logout
                </button>
            </form>

        </div>
    </div>
</div>

<div class="container">

    <!CREATE USER>
    <div class="card">
        <div class="card-header">Create New User</div>
        <div class="card-body">

            <form th:action="@{/admin-register}" method="post"
                  style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">


                <input type="text" name="firstName" placeholder="First Name" required/>
                <input type="text" name="lastName" placeholder="Last Name" required/>
                <input type="text" name="fullName" placeholder="Full Name" required/>

                <input type="text" name="username" placeholder="Username" required/>
                <input type="email" name="email" placeholder="Email" required/>
                <input type="password" name="password" placeholder="Password"/>
                <input type="text" name="countryCode" placeholder="+91" required/>
                <input type="text" name="mobNo" placeholder="Mobile" required/>

                <select name="role" required>
                    <option value="Admin">Admin</option>
                    <option value="Normal User">Normal User</option>
                </select>

                <div style="grid-column: span 3; text-align:right;">
                    <button type="submit"
                            style="background:#0C052E; color:white; border:none; padding:8px 15px; border-radius:4px;">
                        Create User
                    </button>
                </div>

            </form>

        </div>
    </div>

    <!USERS TABLE>
    <div class="card">
        <div class="card-header">Users List</div>
        <div class="card-body">

            <table>
                <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Full Name</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Country Code</th>
                    <th>Mobile</th>
                    <th>Password</th>
                    <th>Role</th>
                    <th>Update</th>
                    <th>Delete</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="user : ${users}">
                    <form th:action="@{/admin-update-user/{uid}(uid=${user.uid})}" method="post">

                        <td>
                            <input type="text" name="firstName" th:value="${user.firstName}" />
                        </td>

                        <td>
                            <input type="text" name="lastName" th:value="${user.lastName}" />
                        </td>

                        <td>
                            <input type="text" name="fullName" th:value="${user.fullName}" />
                        </td>

                        <td>
                            <input type="text" name="username" th:value="${user.username}" readonly />
                        </td>

                        <td>
                            <input type="email" name="email" th:value="${user.email}" />
                        </td>

                        <td>
                            <input type="text" name="countryCode" th:value="${user.countryCode}" />
                        </td>

                        <td>
                            <input type="tel" name="mobNo" th:value="${user.mobNo}" />
                        </td>
                        <td>
                            <input type="password" name="password" placeholder="Password" />
                        </td>
                        <td>
                            <select name="role">
                                <option value="Admin" th:selected="${user.role == 'Admin'}">Admin</option>
                                <option value="Normal User" th:selected="${user.role == 'Normal User'}">Normal User</option>
                            </select>
                        </td>

                        <td>
                            <button type="submit"
                                    style="background:#2980b9; color:white; border:none; padding:5px 10px; border-radius:4px;">
                                Update
                            </button>
                        </td>

                    </form>

                    <td>
                        <form th:action="@{/delete-user/{uid}(uid=${user.uid})}"
                              method="post"
                              onsubmit="return confirm('Delete this user?');">
                            <button type="submit"
                                    style="background:#c0392b; color:white; border:none; padding:5px 10px; border-radius:4px;">
                                Delete
                            </button>
                        </form>
                    </td>

                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

<script>
    function toggleDropdown() {
        let menu = document.getElementById("dropdownMenu");
        menu.style.display = menu.style.display === "block" ? "none" : "block";
    }

    window.onclick = function(event) {
        if (!event.target.closest(".user-dropdown")) {
            document.getElementById("dropdownMenu").style.display = "none";
        }
    };
</script>

</body>
</html>
