<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Responsive Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #22182B, #7D55A1);
        }

        .login-box {
            background: #1C0430;
            padding: 40px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(1,2,3,20);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #D5A5F0;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input:focus {
            border-color: black;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #130F47;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #261F82;
        }

        .register-btn {
            background: #6D5C94;
        }

        .register-btn:hover {
            background: #47474A;
        }

        .message {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: red;
        }

        @media (max-width: 500px) {
            .login-box {
                width: 90%;
                padding: 20px;
            }
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <!-- Spring Security Login Form -->
    <form th:action="@{/login}" method="post">

        <!-- IMPORTANT: name must be 'username' -->
        <input type="email"
               name="username"
               placeholder="Enter Email"
               required>

        <!-- IMPORTANT: name must be 'password' -->
        <input type="password"
               name="password"
               placeholder="Enter Password"
               required>

        <button type="submit">Login</button>

        <button type="button"
                class="register-btn"
                onclick="window.location.href='/register'">
            Register
        </button>

        <!-- Error Message -->
        <div class="message" th:if="${param.error}">
            Invalid Email or Password!
        </div>

        <!-- Logout Message -->
        <div class="message" style="color:green;" th:if="${param.logout}">
            Logged out successfully!
        </div>

    </form>
</div>

</body>
</html>
