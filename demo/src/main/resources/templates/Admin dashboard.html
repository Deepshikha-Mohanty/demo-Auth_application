<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS NOT CHANGED -->
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
    body { background:#CEAFDE; }

    .navbar {
        background:#2F0E40;
        color:white;
        padding:15px 20px;
        display:flex;
        justify-content:space-between;
        align-items:center;
    }

    .user-dropdown { position:relative; cursor:pointer; }

    .dropdown-menu {
        display:none;
        position:absolute;
        right:0;
        top:35px;
        background:white;
        min-width:150px;
        box-shadow:0 2px 8px rgba(0,0,0,0.2);
        border-radius:4px;
        overflow:hidden;
    }

    .dropdown-menu a {
        display:block;
        padding:10px;
        text-decoration:none;
        color:black;
    }

    .dropdown-menu a:hover { background:#f2f2f2; }

    .container { padding:30px; }

    .page-header {
        display:flex;
        justify-content:space-between;
        align-items:center;
        margin-bottom:20px;
    }

    .create-btn {
        background:#0C052E;
        color:white;
        padding:8px 15px;
        border:none;
        border-radius:4px;
        cursor:pointer;
    }

    .card {
        background:#AD73C9;
        border-radius:6px;
        box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .card-header {
        background:#3F3742;
        color:white;
        padding:12px 20px;
    }

    .card-body {
    padding: 25px;
    overflow-x: auto;
    }

    table {
    width: 100%;
    border-collapse: collapse;
    min-width: 1200px;  /* keeps proper column spacing */
}

    table th, table td {
        padding:10px;
        border-bottom:1px solid #ddd;
    }

    table th { background:#f2f2f2; }
  </style>
</head>
<body>

<div class="navbar">
  <h2>Admin Dashboard</h2>

  <div class="user-dropdown" onclick="toggleDropdown()">
    <span th:text="${#authentication.name}"></span> ▾
    <div class="dropdown-menu" id="dropdownMenu">
      <a th:href="@{/logout}">Logout</a>
    </div>
  </div>
</div>

<div class="container">

  <div class="page-header">
    <h2>Users</h2>
  </div>

  <!-- ================= CREATE USER CARD ================= -->
  <div class="card" style="margin-bottom:20px;">
    <div class="card-header">Create New User</div>
    <div class="card-body">

      <form th:action="@{/admin-register}" method="post" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">

        <input type="text" name="First_Name" placeholder="First Name" required/>
        <input type="text" name="Last_Name" placeholder="Last Name" required/>
        <input type="text" name="Full_Name" placeholder="Full Name" required/>

        <input type="text" name="username" placeholder="Username" required/>
        <input type="email" name="email" placeholder="Email" required/>
        <select name="Country Code" required style="width:30%;">
          <option value="+91">+91</option>
        </select>
        <input type="text" name="Mob_No" placeholder="Mobile" required/>

        <input type="text" name="Role" placeholder="Role (ADMIN/USER)" required/>
        <input type="password" name="Password" placeholder="Password" required/>

        <div style="grid-column: span 3; text-align:right;">
          <button type="submit"
                  style="background:#0C052E; color:white; border:none; padding:8px 15px; border-radius:4px;">
            Create User
          </button>
        </div>

      </form>

    </div>
  </div>


  <!-- ================= USERS TABLE ================= -->
  <div class="card">
    <div class="card-header">Users List</div>
    <div class="card-body">

      <table>
        <thead>
        <tr>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Full Name</th>
          <th>Username</th>
          <th>Email</th>
          <th>Country Code</th>
          <th>Mobile</th>
          <th>Role</th>
          <th>Password</th>
          <th>Update</th>
          <th>Delete</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="user : ${users}">

          <!-- UPDATE FORM PER ROW -->
          <form th:action="@{/admin-update-user/{id}(id=${user.uid})}" method="post">

            <td>
              <input type="text" name="First_Name"
                     th:value="${user.First_Name}" />
            </td>

            <td>
              <input type="text" name="Last_Name"
                     th:value="${user.Last_Name}" />
            </td>

            <td>
              <input type="text" name="Full_Name"
                     th:value="${user.Full_Name}" />
            </td>

            <td>
              <input type="text" name="username"
                     th:value="${user.username}" readonly />
            </td>

            <td>
              <input type="text" name="email"
                     th:value="${user.Email}" />
            </td>

            <td>
              <input type="text" name="countryCode"
                     th:value="${user.countryCode}" />
            </td>

            <td>
              <input type="text" name="Mob_No"
                     th:value="${user.Mob_No}" />
            </td>

            <td>
              <input type="text" name="Role"
                     th:value="${user.Role}" />
            </td>

            <td>
              <input type="text" name="Password"
                     th:value="Password" />
            </td>

            <!-- UPDATE BUTTON -->
            <td>
              <button type="submit"
                      style="background:#2980b9; color:white; border:none; padding:5px 10px; border-radius:4px;">
                Update
              </button>
            </td>

          </form>

          <!-- DELETE FORM -->
          <td>
            <form th:action="@{/delete-user/{id}(id=${user.uid})}"
                  method="post"
                  onsubmit="return confirm('Are you sure you want to delete this user?');">

              <button type="submit"
                      style="background:#c0392b; color:white; border:none; padding:5px 10px; border-radius:4px;">
                Delete
              </button>
            </form>
          </td>

        </tr>
        </tbody>
      </table>

    </div>
  </div>

</div>

<script>
  function toggleDropdown() {
      let menu = document.getElementById("dropdownMenu");
      menu.style.display = menu.style.display === "block" ? "none" : "block";
  }

  window.onclick = function(event) {
      if (!event.target.closest(".user-dropdown")) {
          document.getElementById("dropdownMenu").style.display = "none";
      }
  };
</script>

</body>
</html>
